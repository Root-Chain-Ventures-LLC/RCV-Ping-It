# Example values for installing PingIt standalone via the rcv-module chart.
#   helm install pingit oci://ghcr.io/root-chain-ventures-llc/helm/rcv-module \
#     --version 0.1.0 -n rcv -f values.example.yaml
# (Assumes the NOC Portal is already running in the same namespace as `rcv-noc-portal`.)

moduleName: pingit
image:
  repository: ghcr.io/root-chain-ventures-llc/pingit-web
  tag: "latest"            # or pin to v0.1.0
containerPort: 8000
healthPath: /health

postgres:
  enabled: true            # in-chart TimescaleDB; set false to use your own
  image: timescale/timescaledb:latest-pg16
  user: pingit
  database: pingit
  password: "REPLACE_WITH_PG_PASSWORD"

databaseUrlEnv: DATABASE_URL
databaseUrlTemplate: "postgresql+asyncpg://pingit:$(POSTGRES_PASSWORD)@{{host}}:5432/pingit"

env:
  PINGIT_REQUIRE_HTTPS: "true"
  PINGIT_PORTAL_URL: "http://rcv-noc-portal:8000"
  PINGIT_PORTAL_OIDC_ISSUER: "https://noc.example.com"
  PINGIT_PORTAL_OIDC_CLIENT_ID: "pingit"

secretEnv:
  PINGIT_PORTAL_API_KEY: "REPLACE_WITH_PORTAL_API_KEY"
  PINGIT_PORTAL_OIDC_CLIENT_SECRET: "REPLACE_WITH_OIDC_CLIENT_SECRET"

ingress:
  enabled: true
  host: pingit.example.com
